<!DOCTYPE html>
<ht lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <title>Yuri Silva Teixeira</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&family=Press+Start+2P&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/components/main-title.css">
        <link rel="stylesheet" href="css/components/subtitle.css">
        <link rel="stylesheet" href="css/components/box.css">
        <link rel="stylesheet" href="css/components/button.css">
        <link rel="stylesheet" href="css/components/main-action.css">
        <link rel="stylesheet" href="css/components/header.css">
        <link rel="stylesheet" href="css/components/Logo.css">
        <link rel="stylesheet" href="css/components/main-banner.css">
        <link rel="stylesheet" href="css/components/section.css">
        <link rel="stylesheet" href="css/components/main-skill.css">
        <link rel="stylesheet" href="css/components/progress-bar.css">
        <link rel="stylesheet" href="css/components/wrapper-skill.css">
        <link rel="stylesheet" href="css/components/card-projetct.css">
        <link rel="stylesheet" href="css/components/wrapper-card.css">
        
    </head>
    <body>
      <header class="header">
            <span class="logo-texto">Yuri</span>
          
            <nav>
                <a class="main-action" href=""lang="en" >Skills</a>
                <a class="main-action" href="">Projetos</a>
                <a class="main-action" href="">Sobre</a>
                <a class="main-action" href="">Contatos</a>
                <a class="button" href="" lang="en" >Download CV</a>
            
            </nav>
        </header>

        <section class="main-banner">
            <div class="wrapper">
                <div class="box">
                    <h1 class="main-title">Yuri Silva</h1>
                    <h2 class="subtitle">Software Developer</h2>
                </div>

                <div class="navigation">
                    <a class="button" href="" lang="en" >Download CV</a>
                    <a class="button" href="" >Contatos</a>
                </div>
            </div> 
        </section>

        <section class="section">
            <h1 class="main-title -second">Skills</h1>
        
            <div class="wrapper-skill">
                <article class="main-skill "> 
                    <img class="icon" src="img/ico_html5.png" alt="Logo HTML5 em pixel art">
                    <div class="right">
                        <h3 class="title">HTML</h3>
                        <progress class="progress-bar" max="100" value="60">
                        60%
                        </progress>
                    </div>
                </article>
                <article class="main-skill"> 
                    <img class="icon" src="img/ico_python.png" alt="Logo PYTHON em pixel art">
                    <div class="right">
                        <h3 class="title">PYTHON</h3>
                        <progress class="progress-bar" max="100" value="50">
                        50%
                        </progress>
                    </div>
                </article>
                <article class="main-skill "> 
                    <img class="icon" src="img/ico_css3.png" alt="Logo CSS3 em pixel art">
                    <div class="right">
                        <h3 class="title">CSS</h3>
                        <progress class="progress-bar" max="100" value="60">
                        60%
                        </progress>
                    </div>
                </article>
                <article class="main-skill"> 
                    <img class="icon" src="img/ico_support.png" alt="Logo SUPORTE TI em pixel art">
                    <div class="right">
                        <h3 class="title">Suporte TI</h3>
                        <progress class="progress-bar" max="100" value="70">
                        70%
                        </progress>
                    </div>
                </article>
                <article class="main-skill "> 
                    <img class="icon" src="img/ico_js.png" alt="Logo JavaScript em pixel art">
                    <div class="right">
                        <h3 class="title">JavaScript</h3>
                        <progress class="progress-bar" max="100" value="50">
                        50%
                        </progress>
                    </div>
                </article>
                <article class="main-skill"> 
                    <img class="icon" src="img/ico_sql.png" alt="Logo SQL em pixel art">
                    <div class="right">
                        <h3 class="title">SQL</h3>
                        <progress class="progress-bar" max="100" value="50">
                        50%
                        </progress>
                    </div>
                </article>
                <article class="main-skill "> 
                    <img class="icon" src="img/ico_c+.png" alt="Logo C/C++ em pixel art">
                    <div class="right">
                        <h3 class="title">C/C++</h3>
                        <progress class="progress-bar" max="100" value="60">
                        60%
                        </progress>
                    </div>
                </article>
            </div>
        </section> 

        <section class="section -bgBlack -bdFirst">
                <h2 class="main-title -second">Projetos</h2>
                <div class="wrapper-card">
                    <a href="https://yurisilvaaa.github.io/Portifolio/" target="_blank">
                    <figure class="card-project">
                        <img class="Logo" src="img/lista-projetos.png" alt="Logo do Projeto">
                    </figure>
                </a>
            </div>
        </section>
    </body>
</html>
